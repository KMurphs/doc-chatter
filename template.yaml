AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: doc-chatter - Voice-first research paper assistant

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, alpha, prod]

Conditions:
  IsProd: !Equals [!Ref Stage, prod]
  IsDev: !Equals [!Ref Stage, dev]

Globals:
  Function:
    Timeout: 120
    MemorySize: 256

Resources:

  # ============================================================
  # COGNITO USER POOL — user directory, issues JWTs on login
  # ============================================================

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: doc-chatter-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8

  # App Client — how the web app authenticates with the User Pool.
  # No OAuth/Hosted UI config needed since we use Identity Pool for all API access.
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: doc-chatter-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        # TODO: disable in production — use SRP only.
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ============================================================
  # COGNITO IDENTITY POOL — bridges JWT to temporary AWS credentials
  # ============================================================

  # After logging in via the User Pool (JWT), the client exchanges the JWT
  # for temporary AWS credentials. These credentials are scoped to the
  # authenticated role below, which only allows invoking our endpoints.
  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: doc-chatter-identity
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref UserPoolClient
          ProviderName: !GetAtt UserPool.ProviderName

  # IAM role for authenticated users. Permissions:
  # - Invoke the Function URL (lambda:InvokeFunctionUrl)
  # - Call API Gateway endpoints (execute-api:Invoke)
  IdentityPoolAuthRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "cognito-identity.amazonaws.com:aud": !Ref IdentityPool
              "ForAnyValue:StringLike":
                "cognito-identity.amazonaws.com:amr": authenticated
      Policies:
        - PolicyName: InvokeApis
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunctionUrl
                Resource: !GetAtt DocChatterFunction.Arn
              - Effect: Allow
                Action: execute-api:Invoke
                Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${DocChatterApi}/*"

  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref IdentityPool
      Roles:
        authenticated: !GetAtt IdentityPoolAuthRole.Arn

  # ============================================================
  # S3 — session storage
  # ============================================================

  SessionsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "doc-chatter-sessions-${AWS::AccountId}"

  # ============================================================
  # API GATEWAY — REST endpoints with IAM auth
  # ============================================================

  # All endpoints require SigV4-signed requests (IAM auth).
  # The client gets temporary AWS credentials from the Identity Pool
  # and signs every request. No Cognito authorizer needed.
  DocChatterApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Auth:
        DefaultAuthorizer: AWS_IAM
        AddDefaultAuthorizerToCorsPreflight: false
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Amz-Security-Token,X-Amz-Content-Sha256,X-Stream-Token'"
        AllowOrigin: !If
          - IsProd
          - "'https://CLOUDFRONT_DOMAIN_HERE'"
          - "'http://localhost:5174'"

  # ============================================================
  # LAMBDA
  # ============================================================

  DocChatterFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: rust-cargolambda
    Properties:
      CodeUri: ./lambda
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - arm64
      Environment:
        Variables:
          RUST_LOG: info
          DEFAULT_MODEL: sonnet
          SESSIONS_BUCKET: !Ref SessionsBucket
          STREAM_TOKEN_SECRET: !Sub "doc-chatter-${AWS::AccountId}-stream-secret"
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - "arn:aws:bedrock:*::foundation-model/*"
                - "arn:aws:bedrock:*:*:inference-profile/*"
        - S3CrudPolicy:
            BucketName: !Ref SessionsBucket
      Events:
        CreateSession:
          Type: Api
          Properties:
            RestApiId: !Ref DocChatterApi
            Path: /sessions
            Method: POST
            Auth:
              AuthorizationType: AWS_IAM
        ListSessions:
          Type: Api
          Properties:
            RestApiId: !Ref DocChatterApi
            Path: /sessions
            Method: GET
            Auth:
              AuthorizationType: AWS_IAM
        GetSession:
          Type: Api
          Properties:
            RestApiId: !Ref DocChatterApi
            Path: /sessions/{id}
            Method: GET
            Auth:
              AuthorizationType: AWS_IAM
        DeleteSession:
          Type: Api
          Properties:
            RestApiId: !Ref DocChatterApi
            Path: /sessions/{id}
            Method: DELETE
            Auth:
              AuthorizationType: AWS_IAM
        Chat:
          Type: Api
          Properties:
            RestApiId: !Ref DocChatterApi
            Path: /chat
            Method: POST
            Auth:
              AuthorizationType: AWS_IAM
        StreamToken:
          Type: Api
          Properties:
            RestApiId: !Ref DocChatterApi
            Path: /sessions/{id}/stream-token
            Method: POST
            Auth:
              AuthorizationType: AWS_IAM
      # Function URL with IAM auth for streaming.
      FunctionUrlConfig:
        AuthType: AWS_IAM

Outputs:
  FunctionUrl:
    Description: Lambda Function URL (IAM auth, for streaming)
    Value: !GetAtt DocChatterFunctionUrl.FunctionUrl
  ApiUrl:
    Description: API Gateway URL (IAM auth)
    Value: !Sub "https://${DocChatterApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref UserPoolClient
  IdentityPoolId:
    Description: Cognito Identity Pool ID
    Value: !Ref IdentityPool
