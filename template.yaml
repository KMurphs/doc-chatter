AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: doc-chatter - Voice-first research paper assistant

Globals:
  Function:
    Timeout: 120       # Lambda max execution time in seconds (Bedrock calls can be slow)
    MemorySize: 256    # MB of RAM allocated to the Lambda

Resources:

  # ============================================================
  # COGNITO — manages user authentication and JWT token issuance
  # ============================================================

  # The User Pool is a user directory. It stores usernames (emails),
  # passwords, and handles login. When a user logs in, Cognito issues
  # a JWT (JSON Web Token) that proves their identity.
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: doc-chatter-users

      # Users sign up and log in with their email address (not a separate username).
      # Options: email | phone_number | (both). We use email only.
      UsernameAttributes:
        - email

      # When a user signs up, Cognito automatically marks these as verified
      # (skips the verification email/SMS step). This means the email doesn't
      # need to be real — no verification code is sent. That's fine here because
      # we create users manually via admin_create_user, not self-service sign-up.
      # Remove this to force email verification (Cognito sends a code).
      # Options: email | phone_number | (both). We auto-verify email.
      AutoVerifiedAttributes:
        - email

      # Password requirements. Only minimum length is set; Cognito defaults
      # also require uppercase, lowercase, numbers, and symbols.
      # All options: MinimumLength, RequireUppercase, RequireLowercase,
      # RequireNumbers, RequireSymbols, TemporaryPasswordValidityDays.
      # Docs: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/aws-properties-cognito-userpool-passwordpolicy.html
      Policies:
        PasswordPolicy:
          MinimumLength: 8

  # The App Client is how our web app talks to the User Pool.
  # It defines which authentication flows are allowed and where
  # Cognito should redirect after login.
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: doc-chatter-web
      UserPoolId: !Ref UserPool

      # Don't generate a client secret. Client secrets are for server-side apps
      # that can store them safely. Browser/SPA apps can't hide secrets in
      # JavaScript, so Cognito authenticates using only the client ID (public)
      # plus the user's credentials. Set to true only for backend-to-Cognito flows.
      GenerateSecret: false

      # Programmatic auth flows — how code (scripts, backends) authenticates
      # directly with Cognito's API (InitiateAuth / AdminInitiateAuth).
      ExplicitAuthFlows:
        # SRP (Secure Remote Password) — the standard browser login flow.
        # Password never leaves the client; only a proof is sent.
        - ALLOW_USER_SRP_AUTH

        # Direct username+password auth — sends password over HTTPS to Cognito.
        # Simpler than SRP but less secure (password leaves the client).
        # Used by our get-token.sh script for CLI testing.
        # TODO: disable in production — use SRP or Hosted UI only.
        - ALLOW_USER_PASSWORD_AUTH

        # Allow refreshing expired tokens without re-entering credentials.
        - ALLOW_REFRESH_TOKEN_AUTH

      # Browser auth flow — how the Hosted UI (Cognito's login page) delivers
      # tokens back to the app after login via redirect.
      # "implicit" returns tokens directly in the URL fragment (#id_token=xxx).
      # Simple for SPAs. The alternative ("code") is more secure but needs
      # a backend to exchange the code for tokens.
      AllowedOAuthFlows:
        - implicit
      AllowedOAuthFlowsUserPoolClient: true  # required to enable OAuth flows

      # What information the token contains:
      # - openid: standard identity claims (sub, email, etc.)
      # - email: include the user's email in the token
      AllowedOAuthScopes:
        - openid
        - email

      # Where Cognito redirects after successful login.
      # Must match exactly — Cognito rejects mismatches.
      # localhost:5173 is Vite's dev server. Add the production
      # CloudFront URL here when the frontend is deployed.
      CallbackURLs:
        - http://localhost:5173/callback

      # Where Cognito redirects after logout.
      LogoutURLs:
        - http://localhost:5173/

      # Which identity providers are available on the login page.
      # COGNITO means the built-in email+password login.
      # Could add Google, Facebook, SAML, etc. here later.
      SupportedIdentityProviders:
        - COGNITO

  # The domain gives Cognito a URL for its Hosted UI (login page).
  # The login page will be at:
  #   https://doc-chatter-<account-id>.auth.<region>.amazoncognito.com/login
  # This is a pre-built login page — no frontend code needed.
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "doc-chatter-${AWS::AccountId}"
      UserPoolId: !Ref UserPool

  # ============================================================
  # S3 — session storage
  # ============================================================

  # Stores session JSON files (paper text, conversation history, config).
  # One file per session at sessions/<session-id>.json.
  SessionsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "doc-chatter-sessions-${AWS::AccountId}"

  # ============================================================
  # API GATEWAY — HTTP endpoint with Cognito authentication
  # ============================================================

  # API Gateway sits in front of the Lambda and handles:
  # 1. Routing (path + method → Lambda)
  # 2. Authentication (validates JWT before request reaches Lambda)
  # 3. CORS (allows browser requests from different origins)
  DocChatterApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod

      Auth:
        # Every endpoint requires a valid Cognito JWT by default.
        # API Gateway validates the token automatically — if invalid,
        # the request gets a 401 and never reaches the Lambda.
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            # Points the authorizer at our User Pool. API Gateway
            # fetches Cognito's public keys and uses them to verify
            # JWT signatures. No Lambda code needed for this.
            UserPoolArn: !GetAtt UserPool.Arn

      # CORS headers — required for the browser to call the API
      # from a different origin (e.g., localhost:5173 or CloudFront).
      # Without this, browsers block the requests.
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"  # restrict to specific origin in production

  # ============================================================
  # LAMBDA — the application code
  # ============================================================

  DocChatterFunction:
    Type: AWS::Serverless::Function
    Metadata:
      # Tells SAM to build the Rust code using cargo-lambda.
      # SAM runs `cargo lambda build --release` and packages the binary.
      BuildMethod: rust-cargolambda
    Properties:
      CodeUri: ./lambda           # path to the Rust project
      Handler: bootstrap          # binary name (AWS custom runtime convention)
      Runtime: provided.al2023    # custom runtime on Amazon Linux 2023
      Architectures:
        - arm64                   # Graviton — cheaper and faster than x86

      Environment:
        Variables:
          RUST_LOG: info
          DEFAULT_MODEL: sonnet
          SESSIONS_BUCKET: !Ref SessionsBucket          # injected at deploy time
          COGNITO_USER_POOL_ID: !Ref UserPool            # for future JWT validation
          COGNITO_CLIENT_ID: !Ref UserPoolClient         # for future JWT validation
          COGNITO_REGION: !Ref AWS::Region

      # IAM permissions granted to the Lambda
      Policies:
        # Allow calling Bedrock models (both regular and streaming).
        # Two resource patterns because cross-region model IDs (us.anthropic.*)
        # use "inference-profile" ARNs, not "foundation-model" ARNs.
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - "arn:aws:bedrock:*::foundation-model/*"
                - "arn:aws:bedrock:*:*:inference-profile/*"
        # Allow read/write/delete on the sessions S3 bucket.
        # SAM shorthand — expands to GetObject, PutObject, DeleteObject, ListBucket.
        - S3CrudPolicy:
            BucketName: !Ref SessionsBucket

      # Each event wires an API Gateway route to this Lambda.
      # All routes share the same Lambda — routing happens in main.rs.
      Events:
        CreateSession:
          Type: Api
          Properties:
            RestApiId: !Ref DocChatterApi
            Path: /sessions
            Method: POST
        ListSessions:
          Type: Api
          Properties:
            RestApiId: !Ref DocChatterApi
            Path: /sessions
            Method: GET
        GetSession:
          Type: Api
          Properties:
            RestApiId: !Ref DocChatterApi
            Path: /sessions/{id}
            Method: GET
        DeleteSession:
          Type: Api
          Properties:
            RestApiId: !Ref DocChatterApi
            Path: /sessions/{id}
            Method: DELETE
        Chat:
          Type: Api
          Properties:
            RestApiId: !Ref DocChatterApi
            Path: /chat
            Method: POST

# ============================================================
# OUTPUTS — values printed after deploy, used in .env and scripts
# ============================================================

Outputs:
  ApiUrl:
    Description: API Gateway URL (all endpoints)
    Value: !Sub "https://${DocChatterApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  UserPoolId:
    Description: Cognito User Pool ID (needed for create-user.sh and .env)
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito App Client ID (needed for get-token.sh and .env)
    Value: !Ref UserPoolClient
  CognitoDomain:
    Description: Cognito Hosted UI login page URL
    Value: !Sub "https://doc-chatter-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com"
